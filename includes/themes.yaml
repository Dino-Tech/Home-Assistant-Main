      material-background-color: "#1a1a1a"
      material-secondary-background-color: "#121212"
      ha-card-border-radius: var(--neu-radius)
      ha-card-border-width: "0px"
      ha-card-border-color: "transparent"
      ha-card-box-shadow: var(--neu-shadow-inset)

      # --- TEXT COLORS ---
      primary-text-color: "#e0e0e0"
      secondary-text-color: "#9e9e9e"
      disabled-text-color: "#666666"
      text-primary-color: var(--primary-text-color)
      ha-card-header-color: var(--primary-text-color)
      settings-row-content-color: var(--primary-text-color)
      settings-row-secondary-color: var(--secondary-text-color)
      list-item-color: var(--primary-text-color)

      # App Header & Sidebar
      app-header-background-color: "#1a1a1a"
      app-header-text-color: var(--primary-text-color)
      app-header-selection-bar-color: var(--neu-accent)
      sidebar-background-color: "#121212"
      sidebar-text-color: var(--primary-text-color)
      sidebar-icon-color: var(--secondary-text-color)
      sidebar-selected-text-color: var(--neu-accent)
      sidebar-selected-icon-color: var(--neu-accent)

      # State Colors
      state-active-color: var(--neu-accent)
      state-inactive-color: "#666666"
      state-unavailable-color: "#1c1c1c"
      mush-rgb-disabled: "102, 102, 102"

      # --- SWITCHES & SLIDERS ---
      switch-checked-color: var(--neu-accent)
      switch-unchecked-button-color: "#1c1c1c"
      switch-unchecked-track-color: "#0d0d0d"
      slider-color: var(--neu-accent)
      slider-bar-color: var(--neu-accent)
      slider-track-color: "#8cff6650"

      # Forms & Lists
      mdc-list-item-hover-color: var(--neu-accent)
      table-row-alternative-background-color: "#161616"
      input-fill-color: "#161616"
      input-ink-color: var(--primary-text-color)
      input-label-ink-color: var(--secondary-text-color)
      input-dropdown-icon-color: var(--secondary-text-color)

      # --- TYPOGRAPHY ---
      font-family: "'Poetsen One', sans-serif"
      primary-font-family: var(--font-family)
      material-font-family: var(--primary-font-family)
      ha-card-header-font-family: var(--font-family)
      ha-font-family-body: var(--font-family)
      ha-font-family-heading: var(--font-family)
      ha-font-family-code: var(--font-family)
      ha-font-family-longform: var(--font-family)
      ha-font-weight-light: 300
      ha-font-weight-normal: 400
      ha-font-weight-medium: 500
      ha-font-weight-bold: 700
      mdc-typography-font-family: var(--font-family)
      mdc-typography-button-font-family: var(--font-family)
      mdc-typography-headline6-font-family: var(--font-family)
      mdc-typography-body1-font-family: var(--font-family)
      mdc-typography-subtitle1-font-family: var(--font-family)
      mdc-typography-button-text-transform: capitalize
      mdc-button-horizontal-padding: 12px
      md-ref-typeface-plain: var(--font-family)
      md-list-item-label-text-weight: 700

  # ---------------------------------------------------------
  # UIX Configuration
  # ---------------------------------------------------------
  uix-theme: neumorphix-darker-inset

  uix-more-info-yaml: |
    .: |
      ha-dialog {
        --dialog-surface-margin-top: auto !important; 
        --ha-dialog-show-duration: 0s !important; 
      }
    ha-dialog $ wa-dialog $: |
      dialog {
        font-family: var(--font-family, "Poetsen One") !important;
      }
      dialog * {
        font-family: var(--font-family, "Poetsen One") !important;
      }

  uix-root-yaml: |
    .: |
      ha-card[outlined] {
        --ha-card-border-color: #2a2a2a !important;
        --ha-card-border-width: 1px !important;
      }

  uix-sidebar-yaml: |
    .: |
      .badge {
        background-color: var(--neu-accent) !important;
        color: #141414 !important;
      }
