      secondary-text-color: var(--main-color)
      disabled-text-color: var(--light-grey-color)
      app-header-text-color: var(--primary-text-color)

      # --- TYPOGRAPHY ---
      font-family: "'Poetsen One', sans-serif"
      primary-font-family: var(--font-family)
      material-font-family: var(--primary-font-family)
      ha-card-header-font-family: var(--font-family)
      ha-font-family-body: var(--font-family)
      ha-font-family-heading: var(--font-family)
      ha-font-family-code: var(--font-family)
      ha-font-family-longform: var(--font-family)
      ha-font-weight-light: 300
      ha-font-weight-normal: 400
      ha-font-weight-medium: 500
      ha-font-weight-bold: 700

      # --- MDC TYPOGRAPHY & TABS ---
      mdc-typography-font-family: var(--font-family)
      mdc-typography-button-font-family: var(--font-family)
      mdc-typography-headline6-font-family: var(--font-family)
      mdc-typography-body1-font-family: var(--font-family)
      mdc-typography-subtitle1-font-family: var(--font-family)
      mdc-typography-button-text-transform: capitalize
      mdc-button-horizontal-padding: 12px
      md-ref-typeface-plain: var(--font-family)
      md-list-item-label-text-weight: 700
      mdc-tab-indicator-active-indicator-color: var(--main-color)
      mdc-list-item-hover-color: var(--medium-grey-color)

      # --- SIDEBAR ---
      sidebar-background-color: var(--darker-grey-color)
      sidebar-accent-color-light: "rgba(37, 155, 154, 0.5)"
      sidebar-accent-color-lighter: "rgba(37, 155, 154, 0.2)"
      sidebar-icon-color: var(--sidebar-accent-color-light)
      sidebar-selected-background-color: var(--sidebar-accent-color-lighter)
      sidebar-selected-text-color: var(--secondary-text-color)
      sidebar-selected-icon-color: var(--accent-color-lighter)
      sidebar-text-color: var(--primary-text-color)
      sidebar-menu-button-text-color: var(--primary-text-color)
      sidebar-state-pressed-background: var(--accent-color-lighter)

      # --- STATE ICONS ---
      state-icon-color: var(--lighter-grey-color)
      state-icon-active-color: var(--main-color)
      state-icon-unavailable-color: "rgba(255, 80, 10, 0.5)"

      # --- ELEMENTS & CARDS ---
      ha-card-border-radius: "20px"
      ha-card-box-shadow: "inset 4px 4px 8px #090909, inset -4px -4px 8px #222222"
      ha-card-header-color: var(--accent-color)
      divider-color: "rgba(0, 0, 0, .12)"
      table-row-background-color: var(--medium-grey-color)
      table-row-alternative-background-color: var(--medium-grey-color)
      mdc-checkbox-unchecked-color: var(--accent-color)
      mdc-theme-primary: var(--accent-color)
      ha-color-form-background-hover: var(--sidebar-accent-color-lighter)
      dialog-backdrop-filter: blur(2em) brightness(0.80)

      # --- WEBAWESOME: LOUD BUTTONS (e.g., "Perform Action", "Save") ---
      wa-color-brand-fill-loud: var(--accent-color)
      ha-color-fill-primary-loud-hover: var(--accent-color-light)

      # --- WEBAWESOME: NORMAL BUTTONS (e.g., "Add Target", secondary actions) ---
      wa-color-brand-fill-normal: var(--accent-color-lighter)
      ha-color-fill-primary-normal-hover: var(--accent-color-light)
      wa-color-brand-on-normal: var(--primary-text-color)

      # --- WEBAWESOME: QUIET / PLAIN BUTTONS (e.g., "1 device" text links) ---
      wa-color-brand-on-quiet: var(--accent-color)
      ha-color-fill-primary-quiet-hover: var(--accent-color-lighter)
      ha-color-fill-primary-quiet-active: var(--accent-color-light)
      wa-color-neutral-on-quiet: var(--secondary-text-color)

      # --- RESTING / UI CHIPS (e.g., Active Filters) ---
      ha-color-fill-primary-normal-resting: rgba(77, 77, 77, 0.5)

      # --- SWITCHES & SLIDERS ---
      switch-checked-color: var(--accent-color)
      switch-checked-track-color: var(--accent-color-light)
      switch-checked-button-color: var(--accent-color)
      switch-unchecked-button-color: var(--disabled-text-color)
      switch-unchecked-track-color: var(--disabled-text-color)
      slider-color: var(--accent-color)
      slider-bar-color: var(--accent-color)
      slider-track-color: var(--secondary-background-color)

      # --- CUSTOM COMPONENT: MINI MEDIA PLAYER ---
      mini-media-player-base-color: var(--accent-color)
      mini-media-player-icon-color: var(--accent-color-lighter)
      mini-media-player-overlay-base-color: var(--accent-color-light)
      mini-media-player-overlay-accent-color: var(--accent-color-light)
      mini-media-player-media-cover-info-color: var(--accent-color-light)
      mini-media-player-progress-height: 7px
      mini-media-player-button-color: "rgba(255,255,255,0.3)"

      # --- PERSON / MATERIAL FIXES ---
      material-background-color: "#1a1a1a"
      material-secondary-background-color: "#121212"
      material-body-text-color: "#FFFFFF"
      time-picker-elements-background-color: var(--accent-color)
      time-picker-accent-color: var(--accent-color)

      # --- ANIMATED WEATHER ICONS ---
      weather-icon-clear-night: url("/local/weather_icons/animated/clear-night.svg")
      weather-icon-cloudy: url("/local/weather_icons/animated/cloudy.svg")
      weather-icon-fog: url("/local/weather_icons/animated/fog.svg")
      weather-icon-lightning: url("/local/weather_icons/animated/lightning.svg")
      weather-icon-lightning-rainy: url("/local/weather_icons/animated/lightning-rainy.svg")
      weather-icon-partlycloudy: url("/local/weather_icons/animated/partlycloudy.svg")
      weather-icon-pouring: url("/local/weather_icons/animated/pouring.svg")
      weather-icon-rainy: url("/local/weather_icons/animated/rainy.svg")
      weather-icon-hail: url("/local/weather_icons/animated/hail.svg")
      weather-icon-snowy: url("/local/weather_icons/animated/snowy-1.svg")
      weather-icon-snowy-rainy: url("/local/weather_icons/animated/rain-and-snow-mix.svg")
      weather-icon-sunny: url("/local/weather_icons/animated/sunny.svg")
      weather-icon-windy: url("/local/weather_icons/animated/wind.svg")
      weather-icon-windy-variant: url("/local/weather_icons/animated/wind.svg")
      weather-icon-exceptional: url("/local/weather_icons/animated/tornado.svg")

      # --- CUSTOM COMPONENT: HONEYCOMB MENU ---
      honeycomb-menu-active-background-color: "linear-gradient(45deg, #eee, #259B9A)"
      honeycomb-menu-background-color: "linear-gradient(0deg, rgba(60,66,80,1) 0%, rgba(23,26,37,0.7) 42%, rgba(21,25,35,0.6) 100%)"
      honeycomb-menu-disabled: "#00000033"
      honeycomb-menu-icon-active-color: "#ffffffbd"
      honeycomb-menu-icon-color: "#FFFFFF80"

      # --- POPUPS / DIALOGS ---
      dialog-box-shadow: var(--accent-color)
      popup-background-color: rgba(34,38,39,0.75)
      popup-border-radius: 1em
      popup-padding-x: 0px
      popup-padding-y: 0px
      popup-min-width: 20vw
      popup-max-width: 100vw

  # ---------------------------------------------------------
  # UIX Theme Configuration
  # ---------------------------------------------------------
  uix-theme: Geaux-Nightz

  uix-more-info-yaml: |
    .: |
      ha-dialog {
        --dialog-surface-margin-top: auto !important; 
        --ha-dialog-show-duration: 0s !important; 
      }
    ha-dialog $ wa-dialog $: |
      dialog {
        font-family: var(--font-family, "Poetsen One") !important;
      }
      dialog * {
        font-family: var(--font-family, "Poetsen One") !important;
      }

  uix-root-yaml: |
    .: |
      @media (min-width: 768px) {
        hui-sections-view {
          padding-left: 100px !important;
        }
      }
      .toolbar > sl-tab-group {
        pointer-events: none;
        opacity: 0;
      }
      @media (max-width: 767px) {
        hui-sections-view:after {
          content: "";
          display: block;
          height: 80px;
          width: 100%;
          background-color: transparent; 
        }
      }
      .mdc-checkbox__background {
        border: 1px solid white;
      }
      .header {
        transition: shadow 0s !important;
        transition: box-shadow 0s !important;
      }

      ha-card[outlined] {
        --ha-card-border-color: #2a2a2a !important;
        --ha-card-border-width: 1px !important;
      }

  uix-view-yaml: |
    .: |
      ::-webkit-scrollbar {
        background: var(--accent-color-lighter);
      }

