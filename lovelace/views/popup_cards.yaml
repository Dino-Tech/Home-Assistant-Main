---
title: Popups
path: popups
icon: el:briefcase
cards:
  - popup_card_id: test_popup
    type: custom:popup-card
    hide_header: true
    title: Custom popup
    dismissable: true
    card:
      type: markdown
      content: >-
        This card can be used in browser_mod.popup service or to replace the
        more-info dialog
      title: Test
    popup_card_all_views: true

  - popup_card_id: garage_popup
    popup_card_all_views: true
    type: custom:popup-card
    hide_header: true
    title: " "
    size: fullscreen
    right_button: CLOSE
    right_button_close: true
    right_button_variant: neutral
    right_button_appearance: accent
    dismissable: false
    uix:
      style:
        $$ha-dialog-header: |
          :host {
            display: none !important;
          }
    content:
      type: custom:mod-card
      uix:
        style: |
          ha-card {
            background-color: rgba(19, 19, 19, 0.9);
            box-shadow: 0px 0px 2px 1px var(--accent-color-lighter);
            border-radius: 15px;
            padding: 0px, 5px, 15px, 5px;
          }
          .: |
            app-toolbar {
              color: rgba(0, 0, 0,0.58) !important;
              background-color: rgba(0, 0, 0,0.58) !important;
              height: 20px !important;
            }
      card:
        type: custom:vertical-stack-in-card
        uix:
          style: |
            ha-card {
              box-shadow: 0px 0px 2px 1px var(--accent-color-lighter);
              backdrop-filter: blur(9.6px) brightness(0.3) !important;
              -webkit-backdrop-filter: blur(9.6px) brightness(0.3) !important;
            }
        cards:
          - type: custom:mushroom-title-card
            title: Garage
            alignment: center
            title_tap_action:
              action: none
            subtitle_tap_action:
              action: none
          - type: horizontal-stack
            cards:
              - type: custom:button-card
                color_type: blank-card
                styles:
                  card:
                    - width: 8px
              - type: picture-glance
                camera_view: live
                entities: []
                camera_image: camera.garage_cam_0
              - type: custom:button-card
                color_type: blank-card
                styles:
                  card:
                    - width: 8px
          - type: custom:mushroom-cover-card
            uix:
              style: |
                ha-card {
                  backdrop-filter: blur(9.6px) brightness(0.3) !important;
                  -webkit-backdrop-filter: blur(9.6px) brightness(0.3) !important;
                }
            entity: cover.garage_door
            layout: vertical
            fill_container: true
            show_position_control: false
            show_buttons_control: true
          - type: custom:mushroom-light-card
            uix:
              style: |
                ha-card {
                  backdrop-filter: blur(9.6px) brightness(0.3) !important;
                  -webkit-backdrop-filter: blur(9.6px) brightness(0.3) !important;
                }
            entity: light.garage_lights
            icon: mdi:light-recessed
            layout: vertical
            fill_container: true
            show_brightness_control: true

  - popup_card_id: current_weather_popup
    popup_card_all_views: true
    type: custom:popup-card
    hide_header: true
    title: Current Weather
    size: fullscreen
    right_button: CLOSE
    right_button_close: true
    right_button_variant: neutral
    right_button_appearance: accent
    dismissable: false
    uix:
      style:
        $$ha-dialog-header: |
          :host {
            display: none !important;
          }
    content:
      type: custom:vertical-stack-in-card
      uix:
        style: |
          ha-card {
            padding: 0 15px 15px 15px;
            box-shadow: 0px 0px 2px 1px var(--accent-color);
            backdrop-filter: blur(9.6px) brightness(0.3) !important;
            -webkit-backdrop-filter: blur(9.6px) brightness(0.3) !important;
            --ha-card-border-width: 0px;
          }
      cards:
        - type: custom:weather-forecast-card
          show_current: true
          show_forecast: true
          default_forecast: daily
          entity: weather.bayou_gman_s
          icons_path: /local/weather_icons/animated/
          name: Weather at Home
          forecast:
            mode: chart
            show_sun_times: true
            extra_attribute: precipitation_probability
            hourly_group_size: 4
          forecast_action:
            tap_action:
              action: toggle-forecast
        - type: picture
          uix:
            style: |
              ha-card {
                margin: 0px !important;
                padding: 0px !important;
                box-shadow: 0px;
                overflow: hidden;
                height: 247px !important;
              }
          image: >-
            https://s.w-x.co/staticmaps/wu/wu/wxtype1200_cur/usmsy/animate.png
          tap_action:
            action: none

  - popup_card_id: darren_location_popup
    popup_card_all_views: true
    type: custom:popup-card
    hide_header: true
    title: Darren
    size: fullscreen
    right_button: CLOSE
    right_button_close: true
    right_button_variant: neutral
    right_button_appearance: accent
    dismissable: false
    uix:
      style:
        $$ha-dialog-header: |
          :host {
            display: none !important;
          }
    content:
      type: custom:vertical-stack-in-card
      uix:
        style: |
          ha-card {
            padding: 0 15px 15px 15px;
            box-shadow: 0px 0px 2px 1px var(--accent-color);
            border-radius: 20px;
            backdrop-filter: blur(9.6px) brightness(0.3) !important;
            -webkit-backdrop-filter: blur(9.6px) brightness(0.3) !important;
            --ha-card-border-width: 0px;
            height: 780px;
          }
      cards:
        - type: custom:mushroom-entity-card
          entity: sensor.pixel_8_pro_geocoded_location
          secondary_info: last-updated
          primary_info: state
          icon: mdi:map-marker
          icon_color: yellow
        - type: custom:mushroom-entity-card
          entity: sensor.pixel_8_pro_detected_activity_formatted
          secondary_info: last-updated
          primary_info: state
          tap_action:
            action: call-service
            service: notify.mobile_app_pixel_8_pro
            data:
              message: request_location_update
        - type: map
          entities:
            - entity: person.darren
          dark_mode: false
          aspect_ratio: "9:16"
          hours_to_show: 12
          auto_fit: true
          default_zoom: 16

  - popup_card_id: darren_battery_popup
    popup_card_all_views: true
    type: custom:popup-card
    hide_header: true
    title: Darren's Phone
    size: fullscreen
    right_button: CLOSE
    right_button_close: true
    right_button_variant: neutral
    right_button_appearance: accent
    dismissable: false
    uix:
      style:
        $$ha-dialog-header: |
          :host {
            display: none !important;
          }
    content:
      type: custom:mod-card
      uix:
        style: |
          ha-card {
            padding: 5px !important;
            border: solid 2px var(--accent-color-light) !important;
            height: 600px !important;
          }
      card:
        type: gauge
        entity: sensor.pixel_8_pro_battery_level
        needle: true
        severity:
          green: 70
          yellow: 40
          red: 0

