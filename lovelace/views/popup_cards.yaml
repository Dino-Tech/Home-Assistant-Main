    uix:
      style:
        $$ha-dialog-header: |
          :host {
            display: none !important;
          }
    content:
      type: vertical-stack
      cards:
        - type: custom:button-card
          color_type: blank-card
          styles:
            card:
              - height: 5px
        - type: custom:stack-in-card
          mode: vertical
          uix:
            style: |
              ha-card {
                backdrop-filter: blur(19.6px) brightness(0.3);
                -webkit-backdrop-filter: blur(19.6px) brightness(0.3);
              }
          cards:
            - type: grid
              square: false
              columns: 2
              cards:
                - type: custom:mushroom-legacy-template-card
                  entity: climate.den
                  tap_action:
                    action: none
                  icon: |-
                    {% if is_state(entity, 'heat') %}
                      mdi:fire
                    {% elif is_state(entity, 'heat_cool') %}
                      mdi:sun-snowflake
                    {% elif is_state(entity, 'cool') %}
                      mdi:snowflake
                    {% elif is_state(entity, 'fan_only') %}
                      mdi:fan
                    {% else %}
                      mdi:radiator-off
                    {% endif %}
                  icon_color: |-
                    {% if is_state_attr(entity,
                    'hvac_action', 'heating') %}
                      deep-orange
                    {% elif is_state_attr(entity,
                    'hvac_action', 'cooling') %}
                      blue
                    {% elif is_state_attr(entity,
                    'hvac_action', 'drying') %}
                      orange
                    {% elif is_state_attr(entity,
                    'hvac_action', 'fan') %}
                      turquoise
                    {% else %}
                      disabled
                    {% endif %}
                  primary: |
                    {{ states('sensor.den_temperature') | round(1) }}°F
                  secondary: |-
                    {% if is_state(entity, 'heat_cool') %}
                      Heat/Cool
                    {% elif is_state_attr(entity,
                    'hvac_action', 'heating') %}
                      Heating
                    {% elif is_state_attr(entity,
                    'hvac_action', 'cooling') %}
                      Cooling
                    {% elif is_state(entity, 'heat') %}
                      Heat
                    {% elif is_state(entity, 'cool') %}
                      Cool
                    {% elif is_state(entity, 'fan_only') %}
                      Fan
                    {% else %}
                      Off 
                    {% endif %}
                - type: custom:mushroom-legacy-template-card
                  entity: sensor.den_humidity
                  tap_action:
                    action: none
                  primary: |
                    {{ states(entity) | round(1) }}%
                  secondary: Humidity
                  icon: mdi:water-percent
                  icon_color: blue
            - type: thermostat
              entity: climate.den
              theme: Blue-Nightz
              show_current_as_primary: false
              features:
                - style: icons
                  type: climate-hvac-modes
                  hvac_modes:
                    - "off"
                    - heat_cool
                    - heat
                    - cool
            - type: custom:button-card
              color_type: blank-card
              styles:
                card:
                  - height: 15px
            - type: custom:mushroom-entity-card
              entity: sensor.outside_recent_temperature
              layout: vertical
              fill_container: true
              icon_type: none
            - type: custom:button-card
              color_type: blank-card
              styles:
                card:
                  - height: 5px
        - type: custom:mushroom-legacy-template-card
          primary: "FAN {{ state_attr('climate.den', 'fan_mode' ) }}"
          entity: binary_sensor.hvac_fan
          animation: spin
          layout: vertical
          tap_action:
            action: none
          icon_color: >
            {{ ((states(entity)) == 'off') | iif("grey","black")
            }}
          icon: >
            {{ ((states(entity)) == 'off') |
            iif("mdi:fan-off","mdi:fan") }}
          uix:
            style: |
              ha-state-icon {
                --icon-symbol-size: 60px;
              }
              ha-card {
                {% set entity = 'binary_sensor.hvac_fan' %}
                {% if not is_state(entity, 'off') %}
                background: rgba(3, 169, 244,0.6);
                {% endif %}
                text-transform: uppercase;
                padding: 20px 0px 5px 0px;
                box-shadow: 0px 0px 2px 1px rgba(3, 169, 244,0.3);
                backdrop-filter: blur(19.6px) brightness(0.3) !important;
                -webkit-backdrop-filter: blur(19.6px) brightness(0.3) !important;
                }
        - type: horizontal-stack
          cards:
            - type: tile
              features_position: bottom
              vertical: false
              entity: input_button.hvac_15_fan_timer
              hide_state: true
              color: blue
            - type: tile
              features_position: bottom
              vertical: false
              entity: input_button.hvac_30_fan_timer
              hide_state: true
              color: blue

