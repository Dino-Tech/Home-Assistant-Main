              entity: sensor.st_tammany_news
              max_items: 6
              title: St. Tammany News
              allow_multiple: true
    uix:
      style:
        $$ha-dialog-header: |
          :host {
            display: none !important;
          }
    content:
      type: vertical-stack
      cards:
        - type: custom:button-card
