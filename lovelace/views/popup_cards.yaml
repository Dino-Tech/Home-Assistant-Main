  - popup_card_id: calendar_popup
    popup_card_all_views: true
    type: custom:popup-card
    hide_header: true
    title: " "
    size: fullscreen
    right_button: CLOSE
    right_button_close: true
    right_button_variant: neutral
    right_button_appearance: accent
    dismissable: false
    uix:
      style:
        $$ha-dialog-header: |
          :host {
            display: none !important;
          }
    content:
      type: vertical-stack
      cards:
        - entities:
            - calendar.alphaprops_dwilson_gmail_com
            - calendar.family
            - entity: calendar.birthdays
              label: mdi:party-popper
              show_time: false
              show_location: true
            - entity: calendar.dwilson_churchoftheking_com
              label: mdi:church
              show_time: true
              show_location: true
            - entity: calendar.phases_of_the_moon
              label: mdi:moon-waning-crescent
              show_time: false
          days_to_show: 6
          show_empty_days: true
          filter_duplicates: true
          show_past_events: true
          today_indicator: pulse
          today_indicator_size: 7px
          show_countdown: true
          weather:
            position: both # date
            date:
              show_conditions: true
              show_high_temp: true
              show_low_temp: true
              icon_size: 14px
              font_size: 12px
              color: var(--accent-color)
            event:
              show_conditions: true
              show_temp: true
              icon_size: 15px
              font_size: 13px
              color: var(--primary-text-color)
            entity: weather.bayou_gman_s
          type: custom:calendar-card-pro
          tap_action:
            action: expand
          uix:
            style: |
              ha-card {
                border-radius: 16px;
                box-shadow: 12px 12px 24px rgba(0, 0, 0, 0.5), -4px -4px 8px rgba(255, 255, 255,0.1), inset -4px -4px 8px rgba(0, 0, 0, 0.2), inset 4px 4px 8px rgba(255, 255, 255, 0.2) !important;
                background: rgba(38,41,44,0.96) !important;
                backdrop-filter: blur(9.6px) brightness(0.3) !important;
                -webkit-backdrop-filter: blur(9.6px) brightness(0.3) !important;
                overflow: hidden !important;
              }
              ha-card::after {
                content: '' !important;
                position: absolute !important;
                width: 100px !important;
                height: 100% !important;
                background: linear-gradient(
                  to right,
                  rgba(255, 255, 255, 0) 0%,
                  rgba(255, 255, 255, 0.15) 50%,
                  rgba(255, 255, 255, 0) 100%
                ) !important;
                transform: skewX(-15deg) translateX(50px) !important;
                top: 0 !important;
                left: -20px !important;
                z-index: 1 !important;
              }
        - type: custom:button-card
          color_type: blank-card
          styles:
            card:
              - height: 4px

  - popup_card_id: lunar_phases
    popup_card_all_views: true
    type: custom:popup-card
    hide_header: true
    title: " "
    size: fullscreen
    right_button: CLOSE
    right_button_close: true
    right_button_variant: neutral
    right_button_appearance: accent
    dismissable: false
    uix:
      style:
        $$ha-dialog-header: |
          :host {
            display: none !important;
          }
    content:
      type: vertical-stack
      cards:
        - type: custom:button-card
          color_type: blank-card
          styles:
            card:
              - height: 1px
        - type: custom:stack-in-card
          mode: vertical
          uix:
            style: |
              ha-card {
                box-shadow: 0px 0px 2px 1px var(--accent-color);
                backdrop-filter: blur(9.6px) brightness(0.3) !important;
                -webkit-backdrop-filter: blur(9.6px) brightness(0.3) !important;
                height: 800px;
              }
              ha-card::before {
                content: '';
                position: absolute;
                height: 100%;
                width: 100%;
                top: 0;
                border-radius: 22px;
                overflow: hidden;
                opacity: .40;
                background-image: url('https://cdn.jsdelivr.net/gh/ngocjohn/lunar-phase-card@1.7.3/background/moon_bg_3.png');
                background-position: cover;
                background-repeat: no-repeat;
                background-size: 100% 100%;
              }
              .card-content {
                padding: 2px;
              }
              .card-content > div {
                margin: 0 !important;
              }
          cards:
            - type: custom:button-card
              color_type: blank-card
              styles:
                card:
                  - height: 160px
            - type: custom:lunar-phase-card
              entity: ""
              12hr_format: true
              calendar_modal: false
              compact_view: false
              default_card: base
              hide_buttons: false
              mile_unit: true
              moon_position: left
              number_decimals: 2
              selected_language: en
              show_background: true
              southern_hemisphere: false
              use_custom: false
              use_default: true
              use_entity: false
              graph_config:
                graph_type: default
                y_ticks: false
                x_ticks: false
                show_time: true
                show_current: true
                show_highest: true
                y_ticks_position: left
                y_ticks_step_size: 30
                time_step_size: 30
              font_customize:
                header_font_size: x-large
                header_font_style: capitalize
                header_font_color: ""
                label_font_size: auto
                label_font_style: none
                label_font_color: ""
                hide_label: false
              latitude: !secret home_latitude
              longitude: !secret home_longitude
              location:
                city: ""
                country: United States
              theme:
                selected_theme: default
              custom_background: >-
                https://cdn.jsdelivr.net/gh/ngocjohn/lunar-phase-card@1.7.3/background/moon_bg_3.png

  - popup_card_id: google_maps
    popup_card_all_views: true
