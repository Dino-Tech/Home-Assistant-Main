  - popup_card_id: lights_on_popup
    popup_card_all_views: true
    type: custom:popup-card
    hide_header: true
    title: Lights On
    size: fullscreen
    right_button: CLOSE
    right_button_close: true
    right_button_variant: neutral
    right_button_appearance: accent
    dismissable: false
    uix:
      style:
        $$ha-dialog-header: |
          :host {
            display: none !important;
          }
    content:
      type: vertical-stack
      cards:
        - type: conditional
          conditions:
            - condition: state
              entity: light.den_night_lights_zb
              state: "on"
          card:
            type: custom:mushroom-light-card
            show_brightness_control: true
            show_color_control: true
            show_color_temp_control: true
            entity: light.den_night_lights_zb
        - type: conditional
          conditions:
            - condition: state
              entity: light.office_floor_lights
              state: "on"
          card:
            type: custom:mushroom-light-card
            show_brightness_control: true
            show_color_control: true
            show_color_temp_control: true
            entity: light.office_floor_lights
        - type: conditional
          conditions:
            - condition: state
              entity: light.under_cabinet_lights
              state: "on"
          card:
            type: custom:mushroom-light-card
            entity: light.under_cabinet_lights
        - type: conditional
          conditions:
            - condition: state
              entity: light.garage_lights
              state: "on"
          card:
            type: custom:mushroom-light-card
            show_brightness_control: true
            entity: light.garage_lights
        - type: conditional
          conditions:
            - condition: state
              entity: light.kitchen_lights
              state: "on"
          card:
            type: custom:mushroom-light-card
            show_brightness_control: false
            entity: light.kitchen_lights
        - type: conditional
          conditions:
            - condition: state
              entity: light.kitchen_ceiling_lights_3
              state: "on"
          card:
            type: custom:mushroom-light-card
            show_brightness_control: true
            entity: light.kitchen_ceiling_lights_3
        - type: conditional
          conditions:
            - condition: state
              entity: light.den_ceiling_lights_group
              state: "on"
          card:
            type: custom:mushroom-light-card
            show_brightness_control: true
            entity: light.den_ceiling_lights_group
        - type: conditional
          conditions:
            - condition: state
              entity: light.outside_lights
              state: "on"
          card:
            type: custom:mushroom-light-card
            entity: light.outside_lights
        - type: conditional
          conditions:
            - condition: state
              entity: light.guest_night_lights
              state: "on"
          card:
            type: custom:mushroom-light-card
            show_brightness_control: false
            entity: light.guest_night_lights
        - type: conditional
          conditions:
            - condition: state
              entity: light.guest_ceiling_lights
              state: "on"
          card:
            type: custom:mushroom-light-card
            show_brightness_control: true
            show_color_control: true
            show_color_temp_control: true
            entity: light.guest_ceiling_lights
        - type: custom:auto-entities
          uix:
            style: |
              ha-card {
                backdrop-filter: blur(9.6px) brightness(0.3) !important;
                -webkit-backdrop-filter: blur(9.6px) brightness(0.3) !important;
                height: auto;
              }
          filter:
            template: |-
              {% for light in expand('light.every_light') if light.state == 'on' -%}
                {{
                  {
                    'type': 'custom:mushroom-light-card',
                    'entity': light.entity_id,
                    'show_brightness_control': true,
                    'show_color_control': true,
                    'show_color_temp_control': true
                  }
                }},
              {%- endfor %}
            exclude:
              - entity_id: light.coffee_light
              - entity_id: light.cabinet_right_side
              - entity_id: light.cabinet_left_side_zw
              - entity_id: light.sink_light
              - entity_id: light.corner_light
              - entity_id: light.bed_light
              - entity_id: light.desk_light
              - entity_id: light.kitchen_ceiling_lights_2
              - entity_id: light.den_ceiling_light
              - entity_id: light.fireplace_lights
              - entity_id: light.foyer_accent_lights
              - entity_id: light.night_light_2
              - entity_id: light.night_light_3
              - entity_id: light.night_light_4
              - entity_id: light.night_light_5
              - entity_id: light.ha2_office_1
              - entity_id: light.ha2_office_2
              - entity_id: light.ha2_office_3
              - entity_id: light.ha2_office_4
              - entity_id: light.ha2_guest_dimmer
          show_empty: true
          card_param: cards
          sort:
            method: friendly_name
          card:
            type: grid
            columns: 1
            square: false

  - popup_card_id: quantum_web_popup
