title: Newtab
path: newtab
background: rgba(0,0,0,0.0)
#animated_background: none
icon: si:teradata
type: panel
cards:
  - type: custom:mod-card
    uix:
      style: |
        ha-card {
          background: center / cover no-repeat url("/local/images-lovelace/backgroundz/{{ states('input_select.wallpaper') }}.jpg");
          border-radius: 12px;
          padding: 0px;
          margin: 0;
          border: solid 0px rgba(0,0,0,0.0);
          box-sizing: border-box;
          box-shadow: 0px 0px rgba(0,0,0,0.0);
          width: 100vw;
          --ha-card-border-width: 0px;
          height: 805px;
          display: block;
        }
      layout-card$:
        grid-layout$:
          .: |
            #root > * {
              margin: 0px !important;
            }
    card:
      type: custom:layout-card
      layout_type: grid
      layout:
        grid-template-columns: 980px 315px
        grid-template-rows: auto
        margin: -8px 0px 0px -2px
        grid-gap: 0
        padding: 0
        card_margin: 0
      cards:
        - type: custom:state-switch
          entity: input_select.button_layout
          transition: flip
          transition_time: 800
          states:
            mainsection:
              type: custom:stack-in-card
              uix:
                style: |
                  ha-card {
                    background: rgba(0,0,0,0.65);
                    box-shadow: 0px 0px rgba(0,0,0,0.0);
                    border: solid 0px rgba(0,0,0,0.0);
                    --primary-text-color: rgba(255,255,255,0.63);
                    --primary-color": rgba(248, 248, 248,0.53);
                    --ha-card-border-width: 0px;
                    box-shadow: 0px 0px 2px 1px var(--accent-color-lighter);
                    border-radius: 20px;
                  }
                  ha-card::before {
                    content: '';
                    position: absolute;
                    height: 100%;
                    width: 100%;
                    top: 0;
                    border-radius: 20px;
                    overflow: hidden;
                    opacity: .70;
                    background-image: url('{{ state_attr('media_player.now_playing', 'entity_picture') }}');
                    background-position: cover;
                    background-repeat: no-repeat;
                    background-size: 100% 100%;
                  }
                  .card-content {
                    padding: 2px;
                  }
                  .card-content > div {
                    margin: 0 !important;
                  }
              mode: vertical
              cards:
                - type: horizontal-stack
                  cards:
                    - type: custom:bignumber-card
                      uix:
                        style: |
                          ha-card {
                            border-radius: 20px 0px 0px 0px;
                            border: solid 0px rgba(0,0,0,0.0);
                            box-shadow: 0px 0px rgba(0,0,0,0.0);
                            --ha-card-border-width: 0px;
                            background: rgba(0,0,0,0.0);
                            padding: 30px 0px 0px 0px;
                            font-weight: bold;
                            letter-spacing: 2px;
                            height: 40px;
                            display: block;
                          }
                      title: SUNRISE
                      entity: sensor.sunrise
                      scale: 26px
                    - type: custom:bignumber-card
                      uix:
                        style: |
                          ha-card {
                            border-radius: 0px;
                            border: solid 0px rgba(0,0,0,0.0);
                            box-shadow: 0px 0px rgba(0,0,0,0.0);
                            --ha-card-border-width: 0px;
                            background: rgba(0,0,0,0.0);
                            padding: 30px 0px 0px 0px;
                            font-weight: bold;
                            letter-spacing: 2px;
                            height: 40px;
                            display: block;
                          }
                      title: DAYLIGHT HOURS
                      entity: sensor.daylight
                      scale: 26px
                    - type: custom:bignumber-card
                      uix:
                        style: |
                          ha-card {
                            border-radius: 0px 20px 0px 0px;
                            border: solid 0px rgba(0,0,0,0.0);
                            box-shadow: 0px 0px rgba(0,0,0,0.0);
                            --ha-card-border-width: 0px;
                            background: rgba(0,0,0,0.0);
                            padding: 30px 0px 0px 0px;
                            font-weight: bold;
                            letter-spacing: 2px;
                            height: 40px;
                            display: block;
                          }
                      title: SUNSET
                      entity: sensor.sunset
                      scale: 26px
                - type: "custom:simple-clock-card" ##custom:bignumber-card
                  uix:
                    style: |
                      ha-card {
                        border-radius: 0px;
                        background: rgba(0,0,0,0.0);
                        border: solid 0px rgba(0,0,0,0.0);
                        box-shadow: 0px 0px rgba(0,0,0,0.0);
                        --ha-card-border-width: 0px;
                        font-family: Poetsen One;
                        font-weight: bold;
                        letter-spacing: 1px;
                        --primary-text-color: rgba(255,255,255,0.6);
                        text-shadow: 0 1px 0 #999999, 0 2px 0 #8c8c8c, 0 3px 0 #808080, 0 4px 0 #737373, 0 5px 0 #4d4d4d, 0 6px 1px rgba(0,0,0,.1), 0 0 5px rgba(0,0,0,.1), 0 1px 3px rgba(0,0,0,.3), 0 3px 5px rgba(0,0,0,.2), 0 5px 10px rgba(0,0,0,.25), 0 10px 10px rgba(0,0,0,.2), 0 20px 20px rgba(0,0,0,.15);
                        opacity: .70;
                        height: 195px;
                        display: block;
                        overflow: hidden
                      }
                  use_military: false
                  hide_seconds: true
                  bold_clock: true
                  font_size: 11rem
                  paddingTop_size: 0px
                  paddingBottom_size: 0px
                - type: custom:atomic-calendar-revive
                  uix:
                    style: |
                      ha-card {
                        border-radius: 0px;
                        border: solid 0px rgba(0,0,0,0.0);
                        background: rgba(0,0,0,0.0);
                        font-family: Poetsen One;
                        font-size: 2.7em;
                        height: 470px !important;
                        opacity: 0.68;
                        overflow: hidden;
                      }
                  cardHeight: 85%
                  maxDaysToShow: 7
                  maxEventCount: 0
                  showLoader: true
                  showLocation: true
                  showMonth: false
                  fullTextTime: true
                  showCurrentEventLine: false
                  showDate: false
                  dateFormat: LL
                  startDaysAhead: 0
                  showLastCalendarWeek: true
                  sortBy: start
                  allDayBottom: false
                  disableEventLink: false
                  disableLocationLink: false
                  disableCalLocationLink: true
                  disableCalMonthLink: false
                  linkTarget: _blank
                  showDeclined: false
                  showPrivate: true
                  showHiddenText: true
                  showCalendarName: false
                  nameColor: var(--primary-text-color)
                  descColor: var(--primary-text-color)
                  descSize: 80
                  showNoEventsForToday: false
                  showNoEventDays: false
                  hideCardIfNoEvents: false
                  showHours: true
                  showEndTime: true
                  showRelativeTime: true
                  eventTitleColor: var(--primary-text-color)
                  locationIconColor: rgb(--primary-text-color)
                  locationTextSize: 90
                  hideFinishedEvents: false
                  dimFinishedEvents: true
                  finishedEventOpacity: 0.6
                  finishedEventFilter: grayscale(80%)
                  eventBarColor: var(--primary-color)
                  eventCalNameColor: var(--primary-text-color)
                  eventCalNameSize: 90
                  showProgressBar: true
                  showFullDayProgress: false
                  progressBarColor: var(--primary-color)
                  progressBarBackgroundColor: "#555"
                  enableModeChange: true
                  defaultMode: Calendar
                  calGridColor: rgba(86, 86, 86, .35)
                  calDayColor: var(--primary-text-color)
                  calWeekDayColor: var(--primary-text-color)
                  calDateColor: var(--primary-text-color)
                  defaultCalColor: var(--primary-text-color)
                  calEventBackgroundColor: rgba(86, 100, 86, .35)
                  calActiveEventBackgroundColor: rgba(86, 128, 86, .35)
                  calEventTime: false
                  firstDayOfWeek: 0
                  refreshInterval: 60
                  showEventIcon: false
                  eventDateFormat: ddd D MMM
                  hideDuplicates: true
                  showMultiDay: false
                  showMultiDayEventParts: false
                  showWeekNumber: false
                  showDescription: false
                  showEventDate: true
                  showDatePerEvent: false
                  showAllDayHours: false
                  showAllDayEvents: false
                  offsetHeaderDate: false
                  titleLength: 0
                  descLength: 0
                  plannerDaysToShow: 7
                  plannerRollingWeek: false
                  tap_action:
                    action: none
                  hold_action:
                    action: none
                  double_tap_action:
                    action: none
                  name: " "
                  entities:
                    - entity: calendar.alphaprops_dwilson_gmail_com
                    - entity: calendar.dwilson_churchoftheking_com
                    - entity: calendar.phases_of_the_moon
                    - entity: calendar.holidays_in_united_states
                  calShowDescription: false
                  disableCalEventLink: true
                  compactMode: false
                  disableCalLink: true
                - type: custom:simple-weather-card
                  uix:
                    style: |
                      ha-card {
                        border-radius: 0px 0px 20px 20px;
                        border: solid 0px rgba(0,0,0,0.0);
                        box-shadow: 0px 0px rgba(0,0,0,0.0);
                        background: rgba(0,0,0,0.0);
                        --ha-card-border-width: 0px;
                        font-size: 19px;
                        overflow: hidden;
                        height: 70px;
                      }
                  entity: weather.tomorrow_io_new_life_daily
                  secondary_info: humidity
                  name: "Current conditions at home... "
                  backdrop:
                    day: rgba(0,0,0,0.0)
                    night: rgba(0,0,0,0.0)
                    text: rgba(255,255,255,0.75)

            section1:
              type: custom:webrtc-camera
              url: rtsp://thingino:thingino@192.168.20.13:554/ch0
              uix:
                style: |
                  ha-card {
                    border-radius: 20px;
                    background: black;
                    padding: 0px;
                    width: calc(100% - .5px);
                    height: 770px !important;
                    box-sizing: border-box;
                    margin: 0 !important;
                  }
            section2:
              type: custom:webrtc-camera
              url: rtsp://thingino:thingino@192.168.20.69:554/ch1
              uix:
                style: |
                  ha-card {
                    border-radius: 20px;
                    background: black;
                    padding: 0px;
                    width: calc(100% - .5px);
                    height: 770px !important;
                    box-sizing: border-box;
                    margin: 0 !important;
                  }

            section5:
              type: custom:stack-in-card
              uix:
                style: |
                  ha-card {
                    border-radius: 12px;
                    box-shadow: 0px 0px 2px 1px var(--accent-color-lighter);
                    background: rgba(15, 10, 10, 0.94);
                    --state-icon-color: white;
                    backdrop-filter: blur(19.6px) brightness(0.3) !important;
                    -webkit-backdrop-filter: blur(19.6px) brightness(0.3) !important;
                    height: 770px;
                  }
              mode: vertical
              cards:
                - type: custom:button-card
                  color_type: blank-card
                  styles:
                    card:
                      - height: 55px
                - type: custom:mushroom-title-card
                  title: Live Radar
                  alignment: center
                  title_tap_action:
                    action: none
                - type: custom:mod-card
                  card:
                    type: custom:swipe-card
                    card_width: 100%
                    parameters:
                      pagination:
                        type: bullets
                        clickable: true
                      effect: coverflow
                      grabCursor: true
                      centeredSlides: true
                      slidesPerView: auto
                      spaceBetween: 8
                      coverflowEffect:
                        rotate: -50
                        stretch: 0
                        depth: 100
                        modifier: 1
                        slideShadows: true
                      cubeEffect:
                        shadow: true
                      loop: false
                    cards:
                      - type: custom:weather-radar-card
                        map_style: Dark
                        center_latitude: !secret home_latitude
                        center_longitude: !secret home_longitude
                        extra_labels: false
                        show_recenter: true
                        show_marker: true
                        show_playback: false
                        show_zoom: true
                        show_range: false
                        show_scale: false
                        zoom_level: 7
                        frame_count: 15
                      - type: custom:weather-radar-card
                        map_style: Satellite
                        center_latitude: !secret home_latitude
                        center_longitude: !secret home_longitude
                        extra_labels: false
                        show_recenter: true
                        show_marker: true
                        show_playback: false
                        show_zoom: true
                        show_range: false
                        show_scale: false
                        zoom_level: 7
                        frame_count: 15
                        data_source: RainViewer-TWC
                      - type: custom:weather-radar-card
                        map_style: Voyager
                        center_latitude: !secret home_latitude
                        center_longitude: !secret home_longitude
                        extra_labels: false
                        show_recenter: true
                        show_marker: true
                        show_playback: false
                        show_zoom: true
                        show_range: false
                        show_scale: false
                        zoom_level: 7
                        frame_count: 15
                        data_source: RainViewer-TWC
                  style:
                    swipe-card$: |
                      .swiper-container {
                        margin: 0 0 0 0 !important;
                        padding: 65px 30px 10px 30px !important;
                      }
                      .swiper-pagination-bullets {
                      position: absolute;
                      top: 15px;
                      bottom: inherit !important;
                      width: 100%;
                      }
                      .swiper-pagination-bullets>span {
                      margin: 0px !important;
                      min-width: 100px;
                      min-height: 25px;
                      padding-top: 5px;
                      border-radius: 0;
                      background-color: rgba(0, 0, 0, 0.33); /* Set desired color here */
                      }
                      .swiper-pagination-bullets>span:last-child {
                      border-radius: 0px 10px 10px 0px;
                      }
                      .swiper-pagination-bullets>span:first-child {
                      border-radius: 10px 0 0 10px;
                      }
                      .swiper-pagination-bullets>span:nth-child(1):before {
                        content: "Dark";
                        color: lightgray /* Change to desired color */
                      }
                      .swiper-pagination-bullets>span:nth-child(2):before {
                        content: "Satellite";
                        color: lightgray /* Change to desired color */
                      }
                      .swiper-pagination-bullets>span:nth-child(3):before {
                        content: "Voyager";
                        color: lightgray /* Change to desired color */
                      }

                  alignment: center
                - type: custom:button-card
                  color_type: blank-card
                  styles:
                    card:
                      - height: 10px
        #################################################################
        #########    SIDE PANELS    #####################################
        #################################################################

        - type: custom:layout-break
        - type: custom:state-switch
          entity: input_select.button_animation_2
          transition: swap-right
          transition_time: 700
          states:
            buttonshow:
              type: custom:mod-card
              uix:
                style: |
                  ha-card {
                    padding: 0px 3px 0px 3px;
                    background: rgba(0,0,0,0.0) !important;
                    margin: 0;
                  }
              card:
                type: vertical-stack
                cards:
                  - type: custom:entity-progress-card
                    entity: sensor.outside_recent_temperature
                    unit: °F
                    min_value: 20
                    max_value: 105
                    bar_size: large
                    bar_effect:
                      - radius
                      - shimmer
                    theme: temperature
                    name: Outside Temperature
                    icon_tap_action:
                      action: more-info
                    uix:
                      style: |
                        ha-card {
                          background: rgba(0,0,0,0.7);
