- id: '1761965575144'
  alias: '[Presence] First Person Arrives - Welcome actions'
  description: Triggers on house_mode_changed event (new_mode=home, old_mode=away). Fires only when first person arrives from away — guards against manual sleep/vacation->home transitions.
  triggers:
  - trigger: event
    event_type: house_mode_changed
    event_data:
      new_mode: home
      old_mode: away
  conditions: []
  actions:
  - continue_on_error: true
    target:
      entity_id:
      - input_boolean.people_home_boolean
      - input_boolean.camera_snapshots
      - input_boolean.disable_popups
      - input_boolean.auto_tablet
      - input_boolean.auto_backgroundz
      - input_boolean.disable_inside_popups
      - switch.main_kiosk_screen
      - switch.den_nightlight_plugs
      - switch.office_work_bench_zb
    action: homeassistant.turn_on
  - continue_on_error: true
    data:
      command: turn on kitchen water heater
    action: google_assistant_sdk.send_text_command
  - continue_on_error: true
    target:
      entity_id:
      - input_boolean.notifications
      - input_boolean.guest_mode_active
      - input_boolean.patio_garage_alerts
    action: homeassistant.turn_off
  - continue_on_error: true
    data:
      entity_id: media_player.kitchen_speakers_2
      volume_level: 0.4
    action: media_player.volume_set
  - if:
    - condition: state
      entity_id: media_player.kitchen_speakers_2
      state: playing
    then:
    - continue_on_error: true
      target:
        entity_id: media_player.kitchen_speakers_2
      action: media_player.media_stop
  - continue_on_error: true
    action: script.nest_set_home
  - delay:
      minutes: 3
  - continue_on_error: true
    target:
      entity_id:
      - switch.main_kiosk_screen
      - switch.ensuite_kiosk_screen
    action: switch.turn_on
  - delay:
      seconds: 5
  - continue_on_error: true
    target:
      entity_id:
      - light.main_kiosk_screen
    action: light.turn_on
  - continue_on_error: true
    data:
      path: /lovelace/newtab
      browser_id:
      - 22de4b5bc46885f8fafdf89c6db80a28
      - 8ee04fb979f15f78deb7840ab3ca3242
    action: browser_mod.navigate
  - choose:
    - conditions:
      - condition: state
        entity_id: light.outside_lights
        state: 'off'
      sequence:
      - stop: Outside lights are already off
    - conditions:
      - condition: time
        after: '22:00:00'
        before: 07:00:00
      sequence:
      - delay:
          minutes: 4
      - continue_on_error: true
        target:
          entity_id: light.outside_lights
        action: light.turn_off
    - conditions:
      - condition: time
        after: 07:00:01
        before: '21:59:59'
      sequence:
      - delay:
          minutes: 10
      - continue_on_error: true
        target:
          entity_id: light.outside_lights
        action: light.turn_off
  mode: single
