- id: '1761977564662'
  alias: '[Presence] Master Presence Control'
  description: Handles person-based presence for arrivals and departures.
  triggers:
  - entity_id: person.darren
    from: not_home
    to: home
    id: darren
    trigger: state
    for:
      seconds: 8
  - entity_id: person.darren
    from: home
    id: darren
    trigger: state
  - entity_id: person.donna
    from: not_home
    to: home
    id: donna
    trigger: state
  - entity_id: person.donna
    from: home
    id: donna
    trigger: state
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ is_arriving }}'
      sequence:
      - continue_on_error: true
        target:
          entity_id: alarm_control_panel.alarmo
        data:
          code: '{{ states(''input_text.secure_code'') }}'
        action: alarm_control_panel.alarm_disarm
      - choose:
        - conditions:
          - condition: state
            entity_id: binary_sensor.night
            state: 'on'
          sequence:
          - continue_on_error: true
            target:
              entity_id: light.outside_lights
            action: light.turn_on
        - conditions:
          - condition: state
            entity_id: binary_sensor.night
            state: 'off'
          sequence:
          - continue_on_error: true
            target:
              entity_id:
              - light.entryway_ceiling_dimmer
              - light.laundry_room_dimmer
            action: light.turn_on
      - choose:
        - conditions:
          - condition: state
            entity_id: cover.garage_door
            state: closed
          sequence:
          - continue_on_error: true
            target:
              entity_id: cover.garage_door
            action: cover.open_cover
        - conditions:
          - condition: state
            entity_id: cover.garage_door
            state: open
          sequence:
          - continue_on_error: true
            target:
              entity_id: light.garage_lights
            action: light.turn_on
      - choose:
        - conditions:
          - condition: trigger
            id: darren
          sequence:
          - continue_on_error: true
            target:
              entity_id: input_boolean.darren_home
            action: input_boolean.turn_on
          - continue_on_error: true
            target:
              entity_id:
              - input_boolean.patio_garage_alerts
              - input_boolean.naptime
            action: input_boolean.turn_off
        - conditions:
          - condition: trigger
            id: donna
          sequence:
          - continue_on_error: true
            target:
              entity_id: input_boolean.donna_home
            action: input_boolean.turn_on
          - continue_on_error: true
            target:
              entity_id: input_boolean.patio_garage_alerts
            action: input_boolean.turn_off
    - conditions:
      - condition: template
        value_template: '{{ not is_arriving }}'
      sequence:
      - choose:
        - conditions:
          - condition: trigger
            id: darren
          sequence:
          - continue_on_error: true
            target:
              entity_id:
              - input_boolean.camera_snapshots
              - switch.fmd_pixel8pro_high_frequency_mode
            action: homeassistant.turn_on
          - continue_on_error: true
            target:
              entity_id:
              - input_boolean.darren_home
              - light.office_lights
              - switch.ha2_office_monitor
              - fan.hallway_fan
              - switch.keurig_coffee_maker
            action: homeassistant.turn_off
        - conditions:
          - condition: trigger
            id: donna
          sequence:
          - continue_on_error: true
            target:
              entity_id: input_boolean.donna_home
            action: input_boolean.turn_off
          - continue_on_error: true
            target:
              entity_id: input_boolean.patio_garage_alerts
            action: input_boolean.turn_on
  mode: parallel
  max_exceeded: silent
  variables:
    is_arriving: '{{ trigger.to_state.state == ''home'' }}'
