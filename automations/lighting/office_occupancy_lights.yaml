- id: '1938466447855442387'
  alias: Office Occupancy Lights
  triggers:
  - trigger: state
    entity_id: binary_sensor.office_motion_sensors
    to: 'on'
  - trigger: state
    entity_id: binary_sensor.office_mmotion_occupancy
    to: 'on'
  conditions:
  - condition: state
    entity_id: input_boolean.guest_mode_active
    state: 'off'
  - condition: state
    entity_id: input_boolean.naptime
    state: 'off'
  actions:
  - choose:
    - conditions:
      - condition: time
        before: '20:29:59'
        after: 09:00:01
      - condition: state
        entity_id: light.office_lights
        state: 'off'
      sequence:
      - action: light.turn_on
        data:
          brightness_pct: 30
        target:
          entity_id: light.office_lights
    - conditions:
      - condition: time
        before: '23:59:00'
        after: '20:30:00'
      - condition: state
        entity_id: light.office_lights
        state: 'off'
      sequence:
      - action: light.turn_on
        data:
          brightness_pct: 5
        target:
          entity_id: light.office_lights
    - conditions:
      - condition: time
        before: 09:00:00
        after: '23:59:01'
      sequence:
      - delay: 300
    default: []
  - wait_for_trigger:
    - trigger: state
      entity_id: binary_sensor.office_mmotion_occupancy
      to: 'off'
      for:
        minutes: 2
    timeout: 00:30:00
    continue_on_timeout: true
  - action: light.turn_off
    entity_id: light.office_lights
  mode: restart
  max_exceeded: silent
