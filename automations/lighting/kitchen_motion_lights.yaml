- id: '170999999799168'
  alias: '[Motion] Kitchen Motion Lights'
  triggers:
  - trigger: state
    entity_id:
    - binary_sensor.kitchen_bt_motion
    - binary_sensor.kitchen_bt_motion_2
    - binary_sensor.kitchen_bt_motion_3
    - binary_sensor.kitchen_occupancy
    from: 'off'
    to: 'on'
  conditions:
  - condition: state
    entity_id: group.person_group
    state: home
    enabled: true
  - condition: state
    entity_id: input_boolean.guest_mode_active
    state: 'off'
  actions:
  - choose:
    - conditions:
      - condition: time
        after: '23:00:00'
        before: 05:30:00
      sequence:
      - action: light.turn_on
        continue_on_error: true
        target:
          entity_id:
          - light.under_cabinet_lights
    - conditions:
      - condition: time
        after: 05:30:00
        before: 08:00:00
      sequence:
      - action: light.turn_on
        continue_on_error: true
        target:
          entity_id:
          - light.under_cabinet_lights
      - action: light.turn_on
        continue_on_error: true
        target:
          entity_id: light.kitchen_ceiling_lights_3
        data:
          brightness_pct: 70
    - conditions:
      - condition: time
        after: '20:00:00'
        before: '23:00:00'
      sequence:
      - action: light.turn_on
        continue_on_error: true
        target:
          entity_id:
          - light.under_cabinet_lights
      - action: light.turn_on
        continue_on_error: true
        target:
          entity_id: light.kitchen_ceiling_lights_3
        data:
          brightness_pct: 45
    default:
    - action: light.turn_on
      continue_on_error: true
      target:
        entity_id:
        - light.under_cabinet_lights
    - action: light.turn_on
      continue_on_error: true
      target:
        entity_id: light.kitchen_ceiling_lights_3
      data:
        brightness_pct: 90
  - wait_template: '{{ is_state(''binary_sensor.kitchen_motion_sensors'', ''off'')
      }}'
    timeout:
      minutes: 30
    continue_on_timeout: true
  - delay:
      minutes: 1
      seconds: 35
  - action: light.turn_off
    continue_on_error: true
    target:
      entity_id: light.kitchen_ceiling_lights_3
  - delay: 900
  - action: light.turn_off
    continue_on_error: true
    target:
      entity_id:
      - light.under_cabinet_lights
  mode: restart
  max_exceeded: silent
  initial_state: true
