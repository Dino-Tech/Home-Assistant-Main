    "fishNew2":
      - /local/background_videos/fishNew2.mp4

title: New Life Home

views:
  - title: Home
    icon: mdi:home-assistant
    background: transparent
    cards:
      - type: vertical-stack
        cards:
          - type: custom:button-card
            entity: sensor.notification_alerts
            name: NOTIFICATIONS
            show_name: true
            show_icon: false
            show_state: false
            show_label: true
            label: >
              [[[ 
                if (entity.state && entity.state !== "") { return entity.state; } 
                else { return "ALL CLEAR"; } 
              ]]]
            tap_action:
              action: call-service
              service: input_select.select_option
              service_data:
                entity_id: input_select.mobilelayout
                option: mobile3
            hold_action:
              action: call-service
              service: input_select.select_option
              service_data:
                entity_id: input_select.mobilelayout
                option: mobile3
            styles:
              card:
                - background-color: >
                    [[[ 
                      if (entity.state !== "ALL CLEAR") { return "#c80404"; } 
                      else { return "transparent"; } 
                    ]]]
                - border-radius: 16px !important
                - box-shadow: >
                    [[[
                      if (entity.state !== "ALL CLEAR") {
                        return "12px 12px 24px rgba(0, 0, 0, 0.5), -4px -4px 8px rgba(255, 255, 255, 0.1), inset -4px -4px 8px rgba(0, 0, 0, 0.2), inset 4px 4px 8px rgba(255, 255, 255, 0.2) !important";
                      } else {
                        return "inset 4px 4px 8px #090909, inset -4px -4px 8px #222222";
                      }
                    ]]]
                - overflow: hidden !important
                - padding: 6px 10px 10px 10px !important
                - color: "rgb(255, 255, 240)"
                - white-space: normal
                - position: relative !important
                - font-size: 16px
              name:
                - font-weight: bold
                - text-align: center
                - font-size: 22px
                - margin-top: 0
              label:
                - white-space: normal
                - display: block
                - max-width: 100%
                - padding-top: 5px
                - text-align: center
            uix:
              style: |
                {% if not is_state('sensor.notification_alerts', 'ALL CLEAR') %}
                ha-card::after {
                  content: '' !important;
                  position: absolute !important;
                  width: 100px !important;
                  height: 100% !important;
                  background: linear-gradient(
                    to right,
                    rgba(255, 255, 255, 0) 0%,
                    rgba(255, 255, 255, 0.15) 50%,
                    rgba(255, 255, 255, 0) 100%
                  ) !important;
                  transform: skewX(-15deg) translateX(50px) !important;
                  top: 0 !important;
                  left: -20px !important;
                  z-index: 1 !important;
                }
                {% else %}
                ha-card {
                  backdrop-filter: blur(12px);
                  background: rgba(79, 79, 79, 0.5) !important;
                }
                {% endif %}
          - type: custom:weather-alerts-card
            entity: sensor.nws_alerts_alerts
            colorTheme: nws
            layout: compact
            sortOrder: severity
            animations: true
            visibility:
              - condition: state
                entity: binary_sensor.nws_alerts_are_active
                state: "on"
          - type: custom:clock-weather-card
            uix:
              style: |
                ha-card {
                  backdrop-filter: blur(12px);
                  background: rgba(79, 79, 79, 0.5);
                  margin: 0px !important;
                  padding: 0px !important;
                  height: 168px !important;
                  overflow: hidden;
                }
            entity: weather.bayou_gman_s
            sun_entity: sun.sun
            time_format: 12
            temperature_sensor: sensor.outside_recent_temperature
            humidity_sensor: sensor.outside_humidity_at_home
            show_humidity: true
            forecast_rows: 0
            tap_action:
              action: fire-dom-event
              browser_mod:
                service: browser_mod.popup
                data:
                  title: Current Weather
                  size: fullscreen
                  content:
                    type: custom:vertical-stack-in-card
                    uix:
                      style: |
                        ha-card {
                          padding: 0 15px 15px 15px;
                          box-shadow: 0px 0px 2px 1px var(--accent-color);
                          backdrop-filter: blur(9.6px) brightness(0.3) !important;
                          -webkit-backdrop-filter: blur(9.6px) brightness(0.3) !important;
                          --ha-card-border-width: 0px;
                        }
                    cards:
                      - type: custom:weather-forecast-card
                        show_current: true
                        show_forecast: true
                        default_forecast: daily
                        entity: weather.bayou_gman_s
                        icons_path: /local/weather_icons/animated/
                        name: Weather at Home
                        forecast:
                          mode: chart
                          show_sun_times: true
                          extra_attribute: precipitation_probability
                          hourly_group_size: 4
                        forecast_action:
                          tap_action:
                            action: toggle-forecast
                      - type: picture
                        uix:
                          style: |
                            ha-card {
                              margin: 0px !important;
                              padding: 0px !important;
                              box-shadow: 0px;
                              overflow: hidden;
                              height: 247px !important;
                            }
                        image: >-
                          https://s.w-x.co/staticmaps/wu/wu/wxtype1200_cur/usmsy/animate.png
                        tap_action:
                          action: none

          - type: grid
            square: false
            columns: 2
            cards:
              - type: custom:stack-in-card
                uix:
                  style: |
                    ha-card {
                      backdrop-filter: blur(12px);
                      background: rgba(79, 79, 79, 0.5);
                    }
                mode: vertical
                cards:
                  - type: custom:mushroom-person-card
                    entity: person.darren
                    use_entity_picture: true
                    hide_name: true
                    layout: vertical
                    tap_action:
                      action: fire-dom-event
                      browser_mod:
                        service: browser_mod.popup
                        data:
                          title: Darren
                          size: fullscreen
                          right_button: CLOSE
                          right_button_close: true
                          right_button_variant: neutral
                          right_button_appearance: accent
                          dismissable: false
                          content:
                            type: custom:vertical-stack-in-card
                            uix:
                              style: |
                                ha-card {
                                  padding: 0 15px 15px 15px;
                                  box-shadow: 0px 0px 2px 1px var(--accent-color);
                                  border-radius: 20px;
                                  backdrop-filter: blur(9.6px) brightness(0.3) !important;
                                  -webkit-backdrop-filter: blur(9.6px) brightness(0.3) !important;
                                  --ha-card-border-width: 0px;
                                  height: 780px;
                                }
                            cards:
                              - type: custom:mushroom-entity-card
                                entity: sensor.pixel_8_pro_geocoded_location
                                secondary_info: last-updated
                                primary_info: state
                                icon: mdi:map-marker
                                icon_color: yellow
                              - type: custom:mushroom-entity-card
                                entity: sensor.pixel_8_pro_detected_activity_formatted
                                secondary_info: last-updated
                                primary_info: state
                                tap_action:
                                  action: call-service
                                  service: notify.mobile_app_pixel_8_pro
                                  data:
                                    message: request_location_update
                              - type: map
                                entities:
                                  - entity: person.darren
                                dark_mode: false
                                aspect_ratio: "9:16"
                                hours_to_show: 12
                                auto_fit: true
                                default_zoom: 16
                  - type: custom:mushroom-chips-card
                    uix:
                      style: |
                        ha-card {
                          background: transparent !important;
                        }
                    chips:
                      - type: template
                        icon_color: |2-
                                    {% set state=states('device_tracker.94_45_60_5f_c7_00') %}
                                    {% if state=='home' %}
                                    green
                                    {% elif state=='away' %}
                                    DimGray
                                    {% endif %}
                        entity: device_tracker.94_45_60_5f_c7_00
                        icon: mdi:wifi
                        tap_action:
                          action: more-info
                      - type: template
                        icon_color: |2-
                                    {% set state=states('input_boolean.darren_home') %}
                                    {% if state=='on' %}
                                    green
                                    {% elif state=='off' %}
                                    DimGray
                                    {% endif %}
                        entity: input_boolean.darren_home
                        icon: mdi:home-heart
                        tap_action:
                          action: more-info
                      - type: template
                        entity: sensor.pixel_8_pro_battery_level
                        icon: |2
                                    {% set bl = states('sensor.pixel_8_pro_battery_level') | int %}
                                    {% if bl < 10 %} mdi:battery-outline
                                    {% elif bl < 20 %} mdi:battery-10
                                    {% elif bl < 30 %} mdi:battery-20
                                    {% elif bl < 40 %} mdi:battery-30
                                    {% elif bl < 50 %} mdi:battery-40
                                    {% elif bl < 60 %} mdi:battery-50
                                    {% elif bl < 70 %} mdi:battery-60
                                    {% elif bl < 80 %} mdi:battery-70
                                    {% elif bl < 90 %} mdi:battery-80
                                    {% elif bl < 100 %} mdi:battery-90
                                    {% elif bl == 100 %} mdi:battery
                                    {% else %} mdi:battery-unknown
                                    {% endif %}
                        icon_color: |2-
                                    {% set bl = states('sensor.pixel_8_pro_battery_level') | int %}
                                    {% if bl < 10 %} red
                                    {% elif bl < 20 %} red
                                    {% elif bl < 30 %} red
                                    {% elif bl < 40 %} yellow
                                    {% elif bl < 50 %} orange
                                    {% elif bl < 60 %} green
                                    {% elif bl < 70 %} green
                                    {% elif bl < 80 %} green
                                    {% elif bl < 90 %} green
                                    {% elif bl < 100 %} green
                                    {% elif bl == 100 %} green
                                    {% else %} grey
                                    {% endif %}
                        tap_action:
                          action: fire-dom-event
                          browser_mod:
                            service: browser_mod.popup
                            data:
                              title: Darren's Phone
                              size: fullscreen
                              right_button: CLOSE
                              right_button_close: true
                              right_button_variant: neutral
                              right_button_appearance: accent
                              dismissable: false
                              content:
                                type: custom:mod-card
                                uix:
                                  style: |
                                    ha-card {
                                      padding: 5px !important;
                                      border: solid 2px var(--accent-color-light) !important;
                                      height: 600px !important;
                                    }
                                card:
                                  type: gauge
                                  entity: sensor.pixel_8_pro_battery_level
                                  needle: true
                                  severity:
                                    green: 70
                                    yellow: 40
                                    red: 0
                    alignment: center
              - type: custom:stack-in-card
                uix:
                  style: |
                    ha-card {
                      backdrop-filter: blur(12px);
                      background: rgba(79, 79, 79, 0.5);
                    }
                mode: vertical
                cards:
                  - type: custom:mushroom-person-card
                    entity: person.donna
                    use_entity_picture: true
                    hide_name: true
                    layout: vertical
                    tap_action:
                      action: fire-dom-event
                      browser_mod:
                        service: browser_mod.popup
                        data:
                          title: Donna
                          size: fullscreen
                          right_button: CLOSE
                          right_button_close: true
                          right_button_variant: neutral
                          right_button_appearance: accent
                          dismissable: false
                          content:
                            type: custom:vertical-stack-in-card
                            uix:
                              style: |
                                ha-card {
                                  padding: 0 15px 15px 15px;
                                  box-shadow: 0px 0px 2px 1px var(--accent-color);
                                  border-radius: 20px;
                                  backdrop-filter: blur(9.6px) brightness(0.3) !important;
                                  -webkit-backdrop-filter: blur(9.6px) brightness(0.3) !important;
                                  --ha-card-border-width: 0px;
                                  height: 780px;
                                }
                            cards:
                              - type: custom:mushroom-entity-card
                                entity: sensor.pixel_10a_geocoded_location
                                secondary_info: last-updated
                                primary_info: state
                                icon: mdi:map-marker
                                icon_color: yellow
                              - type: custom:mushroom-entity-card
                                entity: sensor.pixel_10a_detected_activity_formatted
                                secondary_info: last-updated
                                primary_info: state
                                tap_action:
                                  action: call-service
                                  service: notify.mobile_app_pixel_10a
                                  data:
                                    message: request_location_update
                              - type: map
                                entities:
                                  - entity: person.donna
                                dark_mode: false
                                aspect_ratio: "9:16"
                                hours_to_show: 12
                                auto_fit: true
                                default_zoom: 16
                  - type: custom:mushroom-chips-card
                    uix:
                      style: |
                        ha-card {
                          box-shadow: 0px 0px 2px 1px var(--accent-color-lighter);
                          background: transparent !important;
                        }
                    chips:
                      - type: template
                        icon_color: |2-
                                    {% set state=states('sensor.pixel_10a_battery_state') %}
                                    {% if state=='charging' %}
                                    green
                                    {% elif state=='discharging' %}
                                    DimGray
                                    {% endif %}
                        entity: sensor.pixel_10a_battery_state
                        icon: mdi:power-plug
                        tap_action:
                          action: more-info
                      - type: template
                        icon_color: |2-
                                    {% set state=states('input_boolean.donna_home') %}
                                    {% if state=='on' %}
                                    green
                                    {% elif state=='off' %}
                                    DimGray
                                    {% endif %}
                        entity: input_boolean.donna_home
                        icon: mdi:home-heart
                        tap_action:
                          action: more-info
                      - type: template
                        entity: sensor.pixel_10a_battery_level
                        icon: |2
                                    {% set bl = states('sensor.pixel_10a_battery_level') | int %}
                                    {% if bl < 10 %} mdi:battery-outline
                                    {% elif bl < 20 %} mdi:battery-10
                                    {% elif bl < 30 %} mdi:battery-20
                                    {% elif bl < 40 %} mdi:battery-30
                                    {% elif bl < 50 %} mdi:battery-40
                                    {% elif bl < 60 %} mdi:battery-50
                                    {% elif bl < 70 %} mdi:battery-60
                                    {% elif bl < 80 %} mdi:battery-70
                                    {% elif bl < 90 %} mdi:battery-80
                                    {% elif bl < 100 %} mdi:battery-90
                                    {% elif bl == 100 %} mdi:battery
                                    {% else %} mdi:battery-unknown
                                    {% endif %}
                        icon_color: |2-
                                    {% set bl = states('sensor.pixel_10a_battery_level') | int %}
                                    {% if bl < 10 %} red
                                    {% elif bl < 20 %} red
                                    {% elif bl < 30 %} red
                                    {% elif bl < 40 %} yellow
                                    {% elif bl < 50 %} orange
                                    {% elif bl < 60 %} green
                                    {% elif bl < 70 %} green
                                    {% elif bl < 80 %} green
                                    {% elif bl < 90 %} green
                                    {% elif bl < 100 %} green
                                    {% elif bl == 100 %} green
                                    {% else %} grey
                                    {% endif %}
                        tap_action:
                          action: fire-dom-event
                          browser_mod:
                            service: browser_mod.popup
                            data:
                              title: Donna's Phone
                              size: fullscreen
                              right_button: CLOSE
                              right_button_close: true
                              right_button_variant: neutral
                              right_button_appearance: accent
                              dismissable: false
                              content:
                                type: custom:mod-card
                                uix:
                                  style: |
                                    ha-card {
                                      padding: 5px;
                                      border: solid 2px var(--accent-color-light);
                                      height: 600px;
                                    }
                                card:
                                  type: gauge
                                  entity: sensor.pixel_10a_battery_level
                                  needle: true
                                  severity:
                                    green: 70
                                    yellow: 40
                                    red: 0
                    alignment: center

      - type: horizontal-stack
        cards:
          - show_name: true
            show_icon: false
            name: Darren Arrived
            icon_height: 34px
            type: button
            tap_action:
              action: perform-action
              perform_action: input_button.press
              target:
                entity_id: input_button.darren_arrives_home
              confirmation:
                text: "Darren has arrived home?"
            entity: input_button.darren_arrives_home
            uix:
              style: |
                ha-card {
                  backdrop-filter: blur(12px);
                  background: rgba(79, 79, 79, 0.5);
                }
          - show_name: true
            show_icon: false
            name: Donna Arrived
            icon_height: 34px
            type: button
            tap_action:
              action: perform-action
              perform_action: input_button.press
              target:
                entity_id: input_button.donna_arrives_home
              confirmation:
                text: "Donna has arrived home?"
            entity: input_button.donna_arrives_home
            uix:
              style: |
                ha-card {
                  backdrop-filter: blur(12px);
                  background: rgba(79, 79, 79, 0.5);
                }

      - type: horizontal-stack
        cards:
          - type: custom:mushroom-legacy-template-card
            entity: cover.garage_door
            icon: mdi:garage-variant
            icon_color: '{{ is_state(entity, "open") | iif(''yellow'', ''white'') }}'
            primary: Garage Door
            secondary: >-
              {% if is_state(config.entity, 'closed') %}
              was closed {{relative_time(states.cover.garage_door.last_changed) }} ago.
              {%else%}
              was opened {{relative_time(states.cover.garage_door.last_changed) }} ago.
              {%endif%}
            multiline_secondary: true
            uix:
              style: |
                ha-state-icon {
                  {% if is_state(config.entity, 'open') %}
                    animation: door 3s steps(1) infinite alternate;
                  {% else %}
                  {% endif %}
                }
                ha-card {
                  backdrop-filter: blur(12px);
                  background: rgba(79, 79, 79, 0.5);
                }
                @keyframes door {
                  0% { clip-path: inset(0 0 0 0); }
                  25%  { clip-path: polygon(0 0, 0 100%, 19% 100%, 19% 74%, 81% 74%, 81% 100%, 100% 100%, 100% 0); }
                  50%  { clip-path: polygon(0 0, 0 100%, 19% 100%, 19% 60%, 81% 60%, 81% 100%, 100% 100%, 100% 0); }
                  75% { clip-path: polygon(0 0, 0 100%, 19% 100%, 19% 48%, 81% 48%, 81% 100%, 100% 100%, 100% 0); }
                }
            tap_action:
              action: fire-dom-event
              browser_mod:
                service: browser_mod.popup
                data:
                  title: " "
                  size: fullscreen
                  right_button: CLOSE
                  right_button_close: true
                  right_button_variant: neutral
                  right_button_appearance: accent
                  dismissable: false
                  content:
                    type: custom:mod-card
                    uix:
                      style: |
                        ha-card {
                          background-color: rgba(19, 19, 19, 0.9);
                          box-shadow: 0px 0px 2px 1px var(--accent-color-lighter);
                          border-radius: 15px;
                          padding: 0px, 5px, 15px, 5px;
                        }
                        .: |
                          app-toolbar {
                            color: rgba(0, 0, 0,0.58) !important;
                            background-color: rgba(0, 0, 0,0.58) !important;
                            height: 20px !important;
                          }
                    card:
                      type: custom:vertical-stack-in-card
                      uix:
                        style: |
                          ha-card {
                            box-shadow: 0px 0px 2px 1px var(--accent-color-lighter);
                            backdrop-filter: blur(9.6px) brightness(0.3) !important;
                            -webkit-backdrop-filter: blur(9.6px) brightness(0.3) !important;
                          }
                      cards:
                        - type: custom:mushroom-title-card
                          title: Garage
                          alignment: center
                          title_tap_action:
                            action: none
                          subtitle_tap_action:
                            action: none
                        - type: horizontal-stack
                          cards:
                            - type: custom:button-card
                              color_type: blank-card
                              styles:
                                card:
                                  - width: 8px
                            - type: picture-glance
                              camera_view: live
                              entities: []
                              camera_image: camera.garage_cam_0
                            - type: custom:button-card
                              color_type: blank-card
                              styles:
                                card:
                                  - width: 8px
                        - type: custom:mushroom-cover-card
                          uix:
                            style: |
                              ha-card {
                                backdrop-filter: blur(9.6px) brightness(0.3) !important;
                                -webkit-backdrop-filter: blur(9.6px) brightness(0.3) !important;
                              }
                          entity: cover.garage_door
                          layout: vertical
                          fill_container: true
                          show_position_control: false
                          show_buttons_control: true
                        - type: custom:mushroom-light-card
                          uix:
                            style: |
                              ha-card {
                                backdrop-filter: blur(9.6px) brightness(0.3) !important;
                                -webkit-backdrop-filter: blur(9.6px) brightness(0.3) !important;
                              }
                          entity: light.garage_lights
                          icon: mdi:light-recessed
                          layout: horizontal
                          fill_container: true
                          show_brightness_control: true
          - type: custom:mushroom-entity-card
            entity: light.every_light
            icon: mdi:lightbulb-on
            uix:
              style: |
                ha-state-icon {
                  color: white;
                  {% if states('light.every_light') == 'on' %}
                    animation: illumination 2s infinite;
                    color: yellow;
                  {% endif %}
                }
                @keyframes illumination {
                  0%, 100% { clip-path: inset(0 0 0 0); }
                  80% { clip-path: polygon(0% 99%, 20% 55%, 22% 37%, 39% 20%, 61% 21%, 77% 35%, 79% 57%, 99% 100%); }
                }
                ha-card {
                  backdrop-filter: blur(12px);
                  background: rgba(79, 79, 79, 0.5);
                }
            fill_container: true
            hold_action:
              action: toggle
            tap_action:
              action: fire-dom-event
              browser_mod:
                service: browser_mod.popup
                data:
