title: New Life Home

views:
  - title: Home
    icon: mdi:home-assistant
    background: transparent
    cards:
      - type: vertical-stack
        cards:
          - type: custom:button-card
            entity: sensor.notification_alerts
            name: NOTIFICATIONS
            show_name: true
            show_icon: false
            show_state: false
            show_label: true
            label: >
              [[[ 
                if (entity.state && entity.state !== "") { return entity.state; } 
                else { return "ALL CLEAR"; } 
              ]]]
            tap_action:
              action: call-service
              service: input_select.select_option
              service_data:
                entity_id: input_select.mobilelayout
                option: mobile3
            hold_action:
              action: call-service
              service: input_select.select_option
              service_data:
                entity_id: input_select.mobilelayout
                option: mobile3
            styles:
              card:
                - background-color: >
                    [[[ 
                      if (entity.state !== "ALL CLEAR") { return "#c80404"; } 
                      else { return "transparent"; } 
                    ]]]
                - border-radius: 16px !important
                - box-shadow: >
                    [[[
                      if (entity.state !== "ALL CLEAR") {
                        return "12px 12px 24px rgba(0, 0, 0, 0.5), -4px -4px 8px rgba(255, 255, 255, 0.1), inset -4px -4px 8px rgba(0, 0, 0, 0.2), inset 4px 4px 8px rgba(255, 255, 255, 0.2) !important";
                      } else {
                        return "inset 4px 4px 8px #090909, inset -4px -4px 8px #222222";
                      }
                    ]]]
                - overflow: hidden !important
                - padding: 6px 10px 10px 10px !important
                - color: "rgb(255, 255, 240)"
                - white-space: normal
                - position: relative !important
                - font-size: 14px
              name:
                - font-weight: bold
                - text-align: center
                - font-size: 22px
                - margin-top: 0
              label:
                - white-space: normal
                - display: block
                - max-width: 100%
                - padding-top: 5px
                - text-align: center
            uix:
              style: |
                {% if not is_state('sensor.notification_alerts', 'ALL CLEAR') %}
                ha-card::after {
                  content: '' !important;
                  position: absolute !important;
                  width: 100px !important;
                  height: 100% !important;
                  background: linear-gradient(
                    to right,
                    rgba(255, 255, 255, 0) 0%,
                    rgba(255, 255, 255, 0.15) 50%,
                    rgba(255, 255, 255, 0) 100%
                  ) !important;
                  transform: skewX(-15deg) translateX(50px) !important;
                  top: 0 !important;
                  left: -20px !important;
                  z-index: 1 !important;
                }
                {% else %}
                ha-card {
                  backdrop-filter: blur(12px);
                  background: rgba(79, 79, 79, 0.5) !important;
                }
                {% endif %}
          - type: custom:weather-alerts-card
            entity: sensor.nws_alerts_alerts
            colorTheme: nws
            layout: compact
            sortOrder: severity
            animations: true
            visibility:
              - condition: state
                entity: binary_sensor.nws_alerts_are_active
                state: "on"
          - type: custom:clock-weather-card
            uix:
              style: |
                ha-card {
                  backdrop-filter: blur(12px);
                  background: rgba(79, 79, 79, 0.5);
                  margin: 0px !important;
                  padding: 0px !important;
                  height: 168px !important;
                  overflow: hidden;
                }
            entity: weather.bayou_gman_s
            sun_entity: sun.sun
            time_format: 12
            temperature_sensor: sensor.outside_recent_temperature
            humidity_sensor: sensor.outside_humidity_at_home
            show_humidity: true
            forecast_rows: 0
            tap_action:
              action: fire-dom-event
              browser_mod:
                service: browser_mod.popup
                data:
                  popup_card_id: current_weather_popup

          - type: grid
            square: false
            columns: 2
            cards:
              - type: custom:stack-in-card
                uix:
                  style: |
                    ha-card {
                      backdrop-filter: blur(12px);
                      background: rgba(79, 79, 79, 0.5);
                    }
                mode: vertical
                cards:
                  - type: custom:mushroom-person-card
                    entity: person.darren
                    use_entity_picture: true
                    hide_name: true
                    layout: vertical
                    tap_action:
                      action: fire-dom-event
                      browser_mod:
                        service: browser_mod.popup
                        data:
                          popup_card_id: darren_location_popup
                  - type: custom:mushroom-chips-card
                    uix:
                      style: |
                        ha-card {
                          background: transparent !important;
                        }
                    chips:
                      - type: template
                        icon_color: |2-
                                    {% set state=states('device_tracker.94_45_60_5f_c7_00') %}
                                    {% if state=='home' %}
                                    green
                                    {% elif state=='away' %}
                                    DimGray
                                    {% endif %}
                        entity: device_tracker.94_45_60_5f_c7_00
                        icon: mdi:wifi
                        tap_action:
                          action: more-info
                      - type: template
                        icon_color: |2-
                                    {% set state=states('input_boolean.darren_home') %}
                                    {% if state=='on' %}
                                    green
                                    {% elif state=='off' %}
                                    DimGray
                                    {% endif %}
                        entity: input_boolean.darren_home
                        icon: mdi:home-heart
                        tap_action:
                          action: more-info
                      - type: template
                        entity: sensor.pixel_8_pro_battery_level
                        icon: |2
                                    {% set bl = states('sensor.pixel_8_pro_battery_level') | int %}
                                    {% if bl < 10 %} mdi:battery-outline
                                    {% elif bl < 20 %} mdi:battery-10
                                    {% elif bl < 30 %} mdi:battery-20
                                    {% elif bl < 40 %} mdi:battery-30
                                    {% elif bl < 50 %} mdi:battery-40
                                    {% elif bl < 60 %} mdi:battery-50
                                    {% elif bl < 70 %} mdi:battery-60
                                    {% elif bl < 80 %} mdi:battery-70
                                    {% elif bl < 90 %} mdi:battery-80
                                    {% elif bl < 100 %} mdi:battery-90
                                    {% elif bl == 100 %} mdi:battery
                                    {% else %} mdi:battery-unknown
                                    {% endif %}
                        icon_color: |2-
                                    {% set bl = states('sensor.pixel_8_pro_battery_level') | int %}
                                    {% if bl < 10 %} red
                                    {% elif bl < 20 %} red
                                    {% elif bl < 30 %} red
                                    {% elif bl < 40 %} yellow
                                    {% elif bl < 50 %} orange
                                    {% elif bl < 60 %} green
                                    {% elif bl < 70 %} green
                                    {% elif bl < 80 %} green
                                    {% elif bl < 90 %} green
                                    {% elif bl < 100 %} green
                                    {% elif bl == 100 %} green
                                    {% else %} grey
                                    {% endif %}
                        tap_action:
                          action: fire-dom-event
                          browser_mod:
                            service: browser_mod.popup
                            data:
                              popup_card_id: darren_battery_popup
                    alignment: center
              - type: custom:stack-in-card
                uix:
                  style: |
                    ha-card {
                      backdrop-filter: blur(12px);
                      background: rgba(79, 79, 79, 0.5);
                    }
                mode: vertical
                cards:
                  - type: custom:mushroom-person-card
                    entity: person.donna
                    use_entity_picture: true
                    hide_name: true
                    layout: vertical
                    tap_action:
                      action: fire-dom-event
                      browser_mod:
                        service: browser_mod.popup
                        data:
                          popup_card_id: donna_location_popup
                  - type: custom:mushroom-chips-card
                    uix:
                      style: |
                        ha-card {
                          box-shadow: 0px 0px 2px 1px var(--accent-color-lighter);
                          background: transparent !important;
                        }
                    chips:
                      - type: template
                        icon_color: |2-
                                    {% set state=states('sensor.pixel_10a_battery_state') %}
                                    {% if state=='charging' %}
                                    green
                                    {% elif state=='discharging' %}
                                    DimGray
                                    {% endif %}
                        entity: sensor.pixel_10a_battery_state
                        icon: mdi:power-plug
                        tap_action:
                          action: more-info
                      - type: template
                        icon_color: |2-
                                    {% set state=states('input_boolean.donna_home') %}
                                    {% if state=='on' %}
                                    green
                                    {% elif state=='off' %}
                                    DimGray
                                    {% endif %}
                        entity: input_boolean.donna_home
                        icon: mdi:home-heart
                        tap_action:
                          action: more-info
                      - type: template
                        entity: sensor.pixel_10a_battery_level
                        icon: |2
                                    {% set bl = states('sensor.pixel_10a_battery_level') | int %}
                                    {% if bl < 10 %} mdi:battery-outline
                                    {% elif bl < 20 %} mdi:battery-10
                                    {% elif bl < 30 %} mdi:battery-20
                                    {% elif bl < 40 %} mdi:battery-30
                                    {% elif bl < 50 %} mdi:battery-40
                                    {% elif bl < 60 %} mdi:battery-50
                                    {% elif bl < 70 %} mdi:battery-60
                                    {% elif bl < 80 %} mdi:battery-70
                                    {% elif bl < 90 %} mdi:battery-80
                                    {% elif bl < 100 %} mdi:battery-90
                                    {% elif bl == 100 %} mdi:battery
                                    {% else %} mdi:battery-unknown
                                    {% endif %}
                        icon_color: |2-
                                    {% set bl = states('sensor.pixel_10a_battery_level') | int %}
                                    {% if bl < 10 %} red
                                    {% elif bl < 20 %} red
                                    {% elif bl < 30 %} red
                                    {% elif bl < 40 %} yellow
                                    {% elif bl < 50 %} orange
                                    {% elif bl < 60 %} green
                                    {% elif bl < 70 %} green
                                    {% elif bl < 80 %} green
                                    {% elif bl < 90 %} green
                                    {% elif bl < 100 %} green
                                    {% elif bl == 100 %} green
                                    {% else %} grey
                                    {% endif %}
                        tap_action:
                          action: fire-dom-event
                          browser_mod:
                            service: browser_mod.popup
                            data:
                              popup_card_id: donna_battery_popup
                    alignment: center

      - type: horizontal-stack
        cards:
          - show_name: true
            show_icon: false
            name: Darren Arrived
            icon_height: 34px
            type: button
            tap_action:
              action: perform-action
              perform_action: input_button.press
              target:
                entity_id: input_button.darren_arrives_home
              confirmation:
                text: "Darren has arrived home?"
            entity: input_button.darren_arrives_home
            uix:
              style: |
                ha-card {
                  backdrop-filter: blur(12px);
                  background: rgba(79, 79, 79, 0.5);
                }
          - show_name: true
            show_icon: false
            name: Donna Arrived
            icon_height: 34px
            type: button
            tap_action:
              action: perform-action
              perform_action: input_button.press
              target:
                entity_id: input_button.donna_arrives_home
              confirmation:
                text: "Donna has arrived home?"
            entity: input_button.donna_arrives_home
            uix:
              style: |
                ha-card {
                  backdrop-filter: blur(12px);
                  background: rgba(79, 79, 79, 0.5);
                }

      - type: horizontal-stack
        cards:
          - type: custom:mushroom-legacy-template-card
            entity: cover.garage_door
            icon: mdi:garage-variant
            icon_color: '{{ is_state(entity, "open") | iif(''yellow'', ''white'') }}'
            primary: Garage Door
            secondary: >-
              {% if is_state(config.entity, 'closed') %}
              was closed {{relative_time(states.cover.garage_door.last_changed) }} ago.
              {%else%}
              was opened {{relative_time(states.cover.garage_door.last_changed) }} ago.
              {%endif%}
            multiline_secondary: true
            uix:
              style: |
                ha-state-icon {
                  {% if is_state(config.entity, 'open') %}
                    animation: door 3s steps(1) infinite alternate;
                  {% else %}
                  {% endif %}
                }
                ha-card {
                  backdrop-filter: blur(12px);
                  background: rgba(79, 79, 79, 0.5);
                }
                @keyframes door {
                  0% { clip-path: inset(0 0 0 0); }
                  25%  { clip-path: polygon(0 0, 0 100%, 19% 100%, 19% 74%, 81% 74%, 81% 100%, 100% 100%, 100% 0); }
                  50%  { clip-path: polygon(0 0, 0 100%, 19% 100%, 19% 60%, 81% 60%, 81% 100%, 100% 100%, 100% 0); }
                  75% { clip-path: polygon(0 0, 0 100%, 19% 100%, 19% 48%, 81% 48%, 81% 100%, 100% 100%, 100% 0); }
                }
            tap_action:
              action: fire-dom-event
              browser_mod:
                service: browser_mod.popup
                data:
                  popup_card_id: garage_popup

          - type: custom:mushroom-entity-card
            entity: light.every_light
            icon: mdi:lightbulb-on
            uix:
              style: |
                ha-state-icon {
                  color: white;
                  {% if states('light.every_light') == 'on' %}
                    animation: illumination 2s infinite;
                    color: yellow;
                  {% endif %}
                }
                @keyframes illumination {
                  0%, 100% { clip-path: inset(0 0 0 0); }
                  80% { clip-path: polygon(0% 99%, 20% 55%, 22% 37%, 39% 20%, 61% 21%, 77% 35%, 79% 57%, 99% 100%); }
                }
                ha-card {
                  backdrop-filter: blur(12px);
                  background: rgba(79, 79, 79, 0.5);
                }
            fill_container: true
            hold_action:
              action: toggle
            tap_action:
              action: fire-dom-event
              browser_mod:
                service: browser_mod.popup
                data:
                  popup_card_id: lights_on_popup

      - type: horizontal-stack
        cards:
          - show_name: true
            show_icon: false
            name: Fans
            icon_height: 34px
            type: button
            tap_action:
              action: fire-dom-event
              browser_mod:
                service: browser_mod.popup
                data:
                  popup_card_id: fans_popup
            entity: sun.sun
            uix:
              style: |
                ha-card {
                  backdrop-filter: blur(12px);
                  background: rgba(79, 79, 79, 0.5);
                }
          - show_name: true
            name: Weather
            show_icon: false
            icon_height: 34px
            icon: mdi:weather-partly-cloudy
            type: button
            entity: sun.sun
            tap_action:
              action: navigate
              navigation_path: /dashboard-test/forecast?disable_km
            uix:
              style: |
                ha-card {
                  backdrop-filter: blur(12px);
                  background: rgba(79, 79, 79, 0.5);
                }
          - show_name: true
            show_icon: false
            icon_height: 34px
            type: button
            name: Air
            tap_action:
              action: fire-dom-event
              browser_mod:
                service: browser_mod.popup
                data:
                  popup_card_id: thermostat
            entity: sun.sun
            uix:
              style: |
                ha-card {
                  backdrop-filter: blur(12px);
                  background: rgba(79, 79, 79, 0.5);
                }

      - type: horizontal-stack
        cards:
          - show_name: true
            show_icon: false
            icon_height: 34px
            type: button
            name: Disarm
            tap_action:
              action: perform-action
              perform_action: input_boolean.turn_on
              target:
                entity_id: input_boolean.alarm_disarm_switch
              confirmation:
                text: "Disarm the alarm?"
            uix:
              style: |
                ha-card {
                  backdrop-filter: blur(12px);
                  background: rgba(79, 79, 79, 0.5);
                }
          - show_name: true
            show_icon: false
            name: Night
            icon_height: 34px
            type: button
            tap_action:
              action: perform-action
              perform_action: script.turn_on
              target:
                entity_id: script.good_night
              confirmation:
                text: "Set house to Sleep mode?"
            uix:
              style: |
                ha-card {
                  backdrop-filter: blur(12px);
                  background: rgba(79, 79, 79, 0.5);
                }
          - show_name: true
            name: Locks
            show_icon: false
            icon_height: 34px
            icon: mdi:home-lock
            type: button
            entity: sun.sun
            tap_action:
              action: fire-dom-event
              browser_mod:
                service: browser_mod.popup
                data:
                  popup_card_id: locks_popup
            uix:
              style: |
                ha-card {
                  backdrop-filter: blur(12px);
                  background: rgba(79, 79, 79, 0.5);
                }

      - type: horizontal-stack
        cards:
          - show_name: true
            name: Moon
            show_icon: false
            icon_height: 34px
            icon: mdi:home-lock
            type: button
            entity: sun.sun
            tap_action:
              action: fire-dom-event
              browser_mod:
                service: browser_mod.popup
                data:
                  popup_card_id: lunar_phases
            uix:
              style: |
                ha-card {
                  backdrop-filter: blur(12px);
                  background: rgba(79, 79, 79, 0.5);
                }
          - show_name: true
            name: Sun
            show_icon: false
            icon_height: 34px
            icon: mdi:theme-light-dark
            type: button
            entity: sun.sun
            tap_action:
              action: fire-dom-event
              browser_mod:
                service: browser_mod.popup
                data:
                  popup_card_id: sun_moon
            uix:
              style: |
                ha-card {
                  backdrop-filter: blur(12px);
                  background: rgba(79, 79, 79, 0.5);
                }
          - type: button
            name: Wind
            show_icon: false
            icon_height: 34px
            icon: mdi:weather-windy-variant
            show_name: true
            entity: sun.sun
            tap_action:
              action: fire-dom-event
              browser_mod:
                service: browser_mod.popup
                data:
                  popup_card_id: wind_popup
            uix:
              style: |
                ha-card {
                  backdrop-filter: blur(12px);
                  background: rgba(79, 79, 79, 0.5);
                }

      - type: horizontal-stack
        cards:
          - type: custom:mushroom-chips-card
            chips:
              - type: light
                entity: light.outside_lights
                name: Outside
                content_info: name
                tap_action:
                  action: perform-action
                  perform_action: light.turn_off
                  confirmation:
                    text: "Toggle outside lights?"
              - type: alarm-control-panel
                entity: alarm_control_panel.alarmo
                hold_action:
                  action: perform-action
                  perform_action: input_boolean.turn_on
                  target:
                    entity_id: input_boolean.alarm_disarm_switch
                tap_action:
                  action: fire-dom-event
                  browser_mod:
                    service: browser_mod.popup
                    data:
                      popup_card_id: alarm_popup
              - type: light
                entity: light.every_light
                content_info: name
                tap_action:
                  action: perform-action
                  perform_action: light.turn_off
                  target:
                    entity_id: light.every_light
                  confirmation:
                    text: "Turn OFF all lights?"
                name: Inside
            alignment: center
            uix:
              style: |
                ha-card {
                  padding: 7px 0px 5px 28px !important;
                  height: 58px !important;
                  --chip-background: rgba(29, 29, 29, 0.8);
                  --chip-box-shadow: none;
                  --chip-border-radius: 20px;
                  --chip-border-color: transparent;
                  --chip-height: 42px;
                  --chip-padding: 10px;
                  --chip-backdrop-filter: blur(12px);
                }

      - type: custom:atmospheric-weather-card
        weather_entity: weather.bayou_gman_s
        theme_entity: sun.sun
        card_style: standalone
        card_height: 136
        text_position: left
        swap_texts: false
        bottom_text_sensor: weather.bayou_gman_s
        bottom_text_icon: weather
        sun_entity: sun.sun
        sun_moon_size: 70
        sun_moon_x_position: 165
        sun_moon_y_position: center
        moon_phase_entity: sensor.moon_phase
        tap_action:
          action: none
        custom_cards_position: top-right
        custom_cards:
          - type: custom:minimal-forecast-card
            custom_width: 190px
            entity: weather.bayou_gman_s
            forecast_type: hourly
            items_to_show: 12
            visible: 2
            style: glass
            hide_min_temp: true
            dividers: true
            divider_color: rgba(255,255,255,0.3)
            divider_width: 2px
            divider_inset: 0px
            item_spacing: 4px
            inner_spacing: 12px
            card_padding: 0px
            item_padding: 1em 20px
            item_height: 50px
            card_shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.15)
            direction: vertical
            font_size: 15px
            icon_size: 22px
            custom_icon_path: /local/weather_icons/animated/
      ######################################################
      ######################################################
      #####  NAV-BAR  #####
      - type: custom:navbar-card
        styles: |
          .navbar {
            background:rgb(16,16,16);
            --navbar-primary-color: rgba(255, 255, 255, 0.85);
            --primary-text-color: rgba(255, 255, 255, 0.85);
            --secondary-text-color: rgba(255, 255, 255, 0.85);
            --icon-primary-color: rgba(255, 255, 255, 0.85);
          }
          .button {
            background: rgb(36,36,36);
          }
          .icon {
            color: rgba(255, 255, 255, 0.85) !important;
            --mdc-icon-button-ink-color: rgba(255, 255, 255, 0.85) !important;
            --icon-color: rgba(255, 255, 255, 0.85) !important;
            --iron-icon-fill-color: rgba(255, 255, 255, 0.85) !important;
          }
          .route {
            color: rgba(255, 255, 255, 0.85) !important;
          }
          .label {
